services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag-api
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: rag-streamlit
    depends_on:
      - api
      - qdrant
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1

  inngest:
    image: node:20-alpine
    container_name: rag-inngest
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8288:8288"
    command: sh -c "npm install -g inngest-cli && inngest dev --no-discovery"

volumes:
  qdrant_data:
